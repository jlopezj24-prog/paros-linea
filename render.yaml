services:
  - type: web
    name: paros-linea
    runtime: python
    plan: free
    region: oregon
    rootDir: .
    buildCommand: |
      pip install -r backend/requirements.txt
      cd frontend && npm install && npm run build
    startCommand: cd backend && uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: PYTHON_VERSION
        value: "3.11"
      - key: GERENTE_PASS
        sync: false
      - key: DATABASE_URL
        fromDatabase:
          name: paros-db
          property: connectionString

databases:
  - name: paros-db
    plan: free
    region: oregon
    databaseName: paros
    user: paros
